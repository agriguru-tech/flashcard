<script>
var LOCK_KEY = 'agriguru_vegcrops_kerala_set1_v1';

var cards = [
  {type:"definition", tag:"Importance", tc:"tag-horticulture",
   q:"What is India's rank in world vegetable production? What is annual production?",
   a:`<div class="kv"><b>World rank</b><span>2nd largest producer of vegetables in the world (after China)</span><b>Annual production</b><span>~209 million tonnes from ~10.9 million ha area (2022-23)</span><b>Global share</b><span>India contributes about 14% of world's vegetable production</span><b>Per capita</b><span>~300 g/day — meeting the ICMR recommended minimum of 300 g/day</span></div>`,
   h:"India = 2nd in world vegetable production. ~209 MT from ~10.9 Mha. 14% of world output.",
   ref:"NHB Horticulture Statistics 2023; ICAR-IIVR; Directorate of Horticulture India"},

  {type:"definition", tag:"Importance", tc:"tag-horticulture",
   q:"State the economic importance of vegetable crops in India.",
   a:`<div class="kv"><b>Employment</b><span>Employs millions in production, processing, marketing — labour-intensive crop</span><b>Income</b><span>Higher returns per unit area than cereals — 5–10× more income from horticulture</span><b>Export earnings</b><span>India exports fresh/processed vegetables — onion, potato, tomato major forex earners</span><b>Agro-industry</b><span>Supports processing, packaging, cold chain, canning industries</span><b>Small farmer</b><span>Suits small holdings — quick returns in 45–90 days (short duration crops)</span></div>`,
   h:"Vegetables = high income/ha, quick returns, employment, export, supports agro-industry.",
   ref:"NHB Annual Report; ICAR Vision 2050; Kerala State Horticulture Mission"},

  {type:"definition", tag:"Importance", tc:"tag-horticulture",
   q:"What is the nutritional importance of vegetables? Name 2 vegetables rich in each nutrient.",
   a:`<div class="kv"><b>Vitamin A</b><span>Carrot, pumpkin, amaranthus — prevents night blindness</span><b>Vitamin C</b><span>Capsicum, tomato, bitter gourd — anti-oxidant, immunity</span><b>Iron</b><span>Amaranthus, cowpea leaves — prevents anaemia</span><b>Calcium</b><span>Drumstick leaves (Moringa), amaranthus — bone health</span><b>Dietary fibre</b><span>All vegetables — prevents constipation, reduces cholesterol</span><b>Protein</b><span>Cowpea, peas, beans — leguminous vegetables</span></div>`,
   h:"Vegs supply vitamins (A, C, K), minerals (Fe, Ca), fibre, anti-oxidants. Moringa = nutritional powerhouse.",
   ref:"ICMR Nutritive Value of Indian Foods; KAU Package of Practices — Vegetables"},

  {type:"definition", tag:"Kerala Stats", tc:"tag-horticulture",
   q:"What is Kerala's vegetable production scenario? Name the top vegetable crops.",
   a:`<div class="kv"><b>Area</b><span>~2.6 lakh ha under vegetables in Kerala</span><b>Production</b><span>~35–40 lakh tonnes per year</span><b>Top crops</b><span>Bitter gourd, snake gourd, ash gourd, cowpea, tomato, brinjal, okra, tapioca (as vegetable)</span><b>Special feature</b><span>Homestead/kitchen garden model — vegetables grown in mixed systems</span><b>Deficit state</b><span>Kerala imports large quantities from Tamil Nadu, Karnataka, Andhra Pradesh</span><b>Season</b><span>Grown year-round due to humid tropical climate; 3 seasons possible</span></div>`,
   h:"Kerala: ~2.6 lakh ha, ~35-40 LT. Imports vegetables! Homestead farming model. Year-round growing.",
   ref:"Kerala State Planning Board; Directorate of Horticulture Kerala; NHB 2023"},

  {type:"definition", tag:"Classification", tc:"tag-horticulture",
   q:"What are warm season vegetables? What temperature range do they require?",
   a:`<div class="kv"><b>Definition</b><span>Vegetables that grow optimally in warm temperatures — cannot tolerate frost; damaged by low temperatures</span><b>Optimal temperature</b><span>20–35°C for growth; germination at 25–30°C</span><b>Examples</b><span>Tomato, brinjal, okra, bitter gourd, snake gourd, ash gourd, pumpkin, cucumber, cowpea, amaranthus</span><b>Kerala relevance</b><span>Most vegetables grown in Kerala are warm season types — suited to tropical humid climate</span><b>Season in Kerala</b><span>Kharif (June–Sept), Rabi (Oct–Jan), Summer (Feb–May)</span></div>`,
   h:"Warm season vegs: 20-35°C, frost-sensitive. Tomato, brinjal, cucurbits, okra. Most Kerala crops.",
   ref:"KAU Package of Practices — Vegetables; ICAR-IIVR Vegetable Crops"},

  {type:"definition", tag:"Classification", tc:"tag-horticulture",
   q:"What are cool season vegetables? What temperature range do they require?",
   a:`<div class="kv"><b>Definition</b><span>Vegetables that thrive in cool temperatures — may bolt or fail to form heads in high temperatures</span><b>Optimal temperature</b><span>10–18°C for best growth; can tolerate mild frost</span><b>Examples</b><span>Cabbage, cauliflower, carrot, peas, beans, radish, beetroot, potato, lettuce, spinach</span><b>Kerala relevance</b><span>Grown in high altitude areas — Wayanad, Munnar, Palakkad hills; also Rabi season in plains</span><b>Limitation</b><span>Poor heading/curd formation if temperature exceeds 25°C — bolting risk</span></div>`,
   h:"Cool season vegs: 10-18°C. Cabbage, cauliflower, peas, carrot. Grown in Kerala highlands.",
   ref:"KAU Package of Practices — Vegetables; TNAU Agritech Portal; ICAR Horticulture"},

  {type:"comparison", tag:"Comparison", tc:"tag-horticulture",
   q:"Compare Warm Season vs Cool Season vegetables on key parameters.",
   a:`<table class="ans-table"><tr><th>Parameter</th><th>Warm Season</th><th>Cool Season</th></tr><tr><td>Temperature</td><td>20–35°C optimal</td><td>10–18°C optimal</td></tr><tr><td>Frost tolerance</td><td>Very sensitive — killed by frost</td><td>Tolerant to mild frost</td></tr><tr><td>Examples</td><td>Tomato, brinjal, okra, cucurbits</td><td>Cabbage, cauliflower, peas, carrot</td></tr><tr><td>Season in Kerala</td><td>Kharif, Rabi, Summer</td><td>Rabi, Winter (highlands)</td></tr><tr><td>Bolting risk</td><td>Low</td><td>High in warm temperatures</td></tr></table>`,
   h:"Warm: 20-35°C, frost sensitive. Cool: 10-18°C, frost tolerant, bolt in heat.",
   ref:"KAU Package of Practices — Vegetables; ICAR Crop Production Technology"},

  {type:"definition", tag:"Warm Season", tc:"tag-horticulture",
   q:"Give the botanical name, family, and 2 KAU/IIHR varieties of Bitter gourd.",
   a:`<div class="kv"><b>Botanical name</b><span>Momordica charantia</span><b>Family</b><span>Cucurbitaceae</span><b>KAU varieties</b><span>Priya, Preethi, Priyanka</span><b>IIHR varieties</b><span>Arka Harit, Arka Sujat</span><b>Kerala importance</b><span>Most important cucurbit in Kerala — high area and production; anti-diabetic properties</span><b>Seed rate</b><span>4–5 kg/ha; spacing 2 m × 1.5 m</span></div>`,
   h:"Bitter gourd: M. charantia, Cucurbitaceae. KAU: Priya, Preethi, Priyanka. IIHR: Arka Harit. Anti-diabetic.",
   ref:"KAU Package of Practices — Bitter Gourd; IIHR Variety Database"},

  {type:"definition", tag:"Warm Season", tc:"tag-horticulture",
   q:"Give the botanical name, family, and varieties of Snake gourd cultivated in Kerala.",
   a:`<div class="kv"><b>Botanical name</b><span>Trichosanthes cucumerina var. anguina</span><b>Family</b><span>Cucurbitaceae</span><b>Varieties</b><span>Baby, Kaumudi, Manusree (KAU); CO-1, CO-2 (TNAU); T-18</span><b>Special feature</b><span>Fruits tied with stones to keep straight — unique to homestead cultivation</span><b>Spacing</b><span>2 m × 1.5 m on bower system; 4–5 kg seed/ha</span><b>Kerala rank</b><span>2nd most important cucurbit in Kerala after bitter gourd</span></div>`,
   h:"Snake gourd: T. cucumerina var. anguina. KAU vars: Baby, Kaumudi, Manusree. 2nd most imp. cucurbit in Kerala.",
   ref:"KAU Package of Practices — Snake Gourd; KAU Vegetable Crop Notes"},

  {type:"definition", tag:"Warm Season", tc:"tag-horticulture",
   q:"What is Ash gourd? Give botanical name, varieties, and uses.",
   a:`<div class="kv"><b>Botanical name</b><span>Benincasa hispida</span><b>Family</b><span>Cucurbitaceae</span><b>Varieties</b><span>Kerala Local, CO-1, CO-2; Arka Ujjwal (IIHR)</span><b>Special features</b><span>Waxy white coating on mature fruit; stores up to 1 year without refrigeration</span><b>Uses</b><span>Vegetable, juice (Kashi halwa), Ayurvedic medicine, cooling beverage, preserves</span><b>Seed rate</b><span>4–5 kg/ha; direct seeding or transplanting</span></div>`,
   h:"Ash gourd: B. hispida. Kerala Local variety. Waxy coating = long shelf life. Kashi halwa.",
   ref:"KAU Package of Practices — Ash Gourd; ICAR Cucurbit Crops"},

  {type:"definition", tag:"Warm Season", tc:"tag-horticulture",
   q:"State the botanical name, important varieties and package of practices for Tomato in Kerala.",
   a:`<div class="kv"><b>Botanical name</b><span>Solanum lycopersicum (syn. Lycopersicon esculentum)</span><b>Family</b><span>Solanaceae</span><b>Varieties</b><span>Sakthi (KAU), Arka Vikas, Arka Abha (IIHR), PKM-1, Mukthi (hybrid)</span><b>Seed rate</b><span>400–500 g/ha (transplanting); nursery age: 25–30 days</span><b>Spacing</b><span>60 cm × 45 cm (determinate); 90 cm × 60 cm (indeterminate)</span><b>Major problems</b><span>Bacterial wilt (Ralstonia), leaf curl virus (TLCV), early blight (Alternaria)</span></div>`,
   h:"Tomato: S. lycopersicum. KAU var: Sakthi. IIHR: Arka Vikas. Transplanting at 25-30 days.",
   ref:"KAU Package of Practices — Tomato; IIHR Vegetable Database"},

  {type:"definition", tag:"Warm Season", tc:"tag-horticulture",
   q:"Give the botanical name, varieties and key cultivation details of Brinjal in Kerala.",
   a:`<div class="kv"><b>Botanical name</b><span>Solanum melongena</span><b>Family</b><span>Solanaceae</span><b>Varieties</b><span>Surya (KAU), Arka Keshav, Arka Nidhi (IIHR), Pusa Purple Long, CO-2</span><b>Seed rate</b><span>400–500 g/ha; nursery period 25–30 days</span><b>Spacing</b><span>60 cm × 60 cm</span><b>Major pest</b><span>Shoot and Fruit Borer (Leucinodes orbonalis) — most serious pest of brinjal</span></div>`,
   h:"Brinjal: S. melongena. KAU: Surya. IIHR: Arka Keshav. Major pest = Shoot &amp; Fruit Borer.",
   ref:"KAU Package of Practices — Brinjal; ICAR-IIVR Brinjal Crop Guide"},

  {type:"definition", tag:"Warm Season", tc:"tag-horticulture",

var activeTypes = {definition:true, process:true, comparison:true, visual:true, qa:true};
var typeConfig = {
  definition:{label:"Definition", bg:"#E3F2FD", col:"#0D47A1", dot:"#1976D2"},
  process:    {label:"Process",    bg:"#E8F5E9", col:"#1B5E20", dot:"#388E3C"},
  comparison: {label:"Comparison", bg:"#FFF8E1", col:"#E65100", dot:"#F57C00"},
  visual:     {label:"Visual",     bg:"#FCE4EC", col:"#880E4F", dot:"#C2185B"},
  qa:         {label:"Q & A",      bg:"#F3E5F5", col:"#4A148C", dot:"#7B1FA2"}
};
var idx = 0, score = 0, streak = 0, flipped = false;
var filteredCards = [];

function buildFilters() {
  var row = document.getElementById('filter-row');
  row.innerHTML = '';
  Object.keys(typeConfig).forEach(function(t) {
    var cnt = cards.filter(function(c){return c.type===t;}).length;
    if (!cnt) return;
    var cfg = typeConfig[t];
    var p = document.createElement('button');
    p.className = 'fpill' + (activeTypes[t] ? '' : ' off');
    p.textContent = cfg.label + ' (' + cnt + ')';
    p.style.cssText = 'background:' + cfg.bg + ';color:' + cfg.col + ';border-color:' + cfg.dot;
    p.onclick = function() {
      activeTypes[t] = !activeTypes[t];
      p.classList.toggle('off');
      applyFilter();
    };
    row.appendChild(p);
  });
}

function applyFilter() {
  filteredCards = cards.filter(function(c){ return activeTypes[c.type]; });
  idx = 0; score = 0; streak = 0;
  document.getElementById('done').style.display = 'none';
  document.getElementById('card').style.display = 'flex';
  document.getElementById('streak').style.display = 'block';
  document.getElementById('btns').style.display = 'none';
  render();
}

function render() {
  if (!filteredCards.length) return;
  var c = filteredCards[idx];
  document.getElementById('tag').textContent = c.tag;
  document.getElementById('tag').className = c.tc;
  document.getElementById('question').textContent = c.q;
  document.getElementById('answer').innerHTML = c.a;
  document.getElementById('hint').textContent = c.h;
  document.getElementById('ref-text').innerHTML = '<span>Ref:</span> ' + c.ref;
  document.getElementById('counter').textContent = 'Card ' + (idx + 1) + ' of ' + filteredCards.length;
  document.getElementById('score-num').textContent = score;
  var pct = Math.max(3, Math.round((idx / filteredCards.length) * 100));
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('answer-area').style.display = 'none';
  document.getElementById('btns').style.display = 'none';
  document.getElementById('tap-hint').style.display = 'block';
  document.getElementById('streak').textContent = '';
  document.getElementById('card').className = 'state-q';
  flipped = false;
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('answer-area').style.display = 'block';
  document.getElementById('btns').style.display = 'flex';
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('card').className = 'state-a';
}

function mark(got) {
  if (got) { score++; streak++; document.getElementById('score-num').textContent = score;
    if (streak >= 3) document.getElementById('streak').textContent = streak + ' correct in a row! Keep going!';
  } else { streak = 0; }
  idx++;
  if (idx >= filteredCards.length) showDone();
  else render();
}

function showDone() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('streak').style.display = 'none';
  document.getElementById('btns').style.display = 'none';
  document.getElementById('done').style.display = 'flex';
  var pct = Math.round((score / filteredCards.length) * 100);
  document.getElementById('done-title').textContent = score + ' / ' + filteredCards.length + ' correct (' + pct + '%)';
  var msg = pct >= 80 ? 'Excellent! You are well prepared for this section.'
            : pct >= 60 ? 'Good effort! Review the topics you missed.'
            : 'Keep practising! Focus on missed topics — you can do it.';
  document.getElementById('done-msg').textContent = msg;
}

function restart() {
  idx = 0; score = 0; streak = 0;
  document.getElementById('done').style.display = 'none';
  document.getElementById('card').style.display = 'flex';
  document.getElementById('streak').style.display = 'block';
  render();
}

buildFilters();
applyFilter();
</script>
